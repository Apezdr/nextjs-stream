; ------------------------------------------------------------------------
; ------------------------------------------------------------------------

[MeterOverallText]
Hidden=1
Group=activated
Meter=String
X=((#SkinWidth#/2)+#LeftPadding#+335)
Y=(#StartingBarYaxis#+173)
W=#BarWidth#
H=20
StringAlign=Center
FontColor=#DefaultFontColor#
StringStyle=Bold
FontSize=(#OverallSize#+14)
AntiAlias=1
Text=Overall Progress

; ------------------------------------------------------------------------
; ------------------------------------------------------------------------

[OverallHelpIcon]
Hidden=1
Group=activated
Meter=Image
ImageName=#@#\images\information_overall.png
X=((#SkinWidth#/2)+#LeftPadding#+410)
Y=(#StartingBarYaxis#+170)
H=(#OverallSize#+10)
W=(#OverallSize#+10)
ToolTipType=1
ToolTipText=This will show you the Overall Progress of the currently active streams.
MouseOverAction=[!SetOption OverallHelpIcon ImageAlpha "160"]
MouseLeaveAction=[!SetOption OverallHelpIcon ImageAlpha "255"]
LeftMouseDoubleClickAction=[!SetOption OverallHelpIcon Hidden "1"][!SetOption OverallHelpIcon Group ""]

; ------------------------------------------------------------------------
; ------------------------------------------------------------------------

[CalcMeasureProgressOverall]
Disabled=1
Group=activated
Measure=Calc
Formula=(MeasureActivityProgressNumber1 + MeasureActivityProgressNumber2  + MeasureActivityProgressNumber3 + MeasureActivityProgressNumber4  + MeasureActivityProgressNumber5+ MeasureActivityProgressNumber6 + MeasureActivityProgressNumber7 +  MeasureActivityProgressNumber8 + MeasureActivityProgressNumber9 + MeasureActivityProgressNumber10) / (MeasureActivityStreamCount + 0.0001)
MinValue=0
MaxValue=100
DynamicVariables=1

[CalcMeasureProgressOverallRounded]
Disabled=1
Group=activated
Measure=Calc
Formula=(ROUND((CalcMeasureProgressOverall)/(0.10)))*(0.10)
MinValue=0
MaxValue=100
DynamicVariables=1

[CalcMeasureTranscodingProgressOverall]
Disabled=1
Group=activated
Measure=Calc
Formula=(MeasureActivityTranscodeProgressNumber1 + MeasureActivityTranscodeProgressNumber2 + MeasureActivityTranscodeProgressNumber3 + MeasureActivityTranscodeProgressNumber4  + MeasureActivityTranscodeProgressNumber5+ MeasureActivityTranscodeProgressNumber6 + MeasureActivityTranscodeProgressNumber7 +  MeasureActivityTranscodeProgressNumber8 + MeasureActivityTranscodeProgressNumber9 + MeasureActivityTranscodeProgressNumber10) / (MeasureActivityStreamCount + 0.0001)
MinValue=0
MaxValue=100
DynamicVariables=1

[CalcMeasureTranscodingProgressOverallRounded]
Disabled=1
Group=activated
Measure=Calc
Formula=(ROUND((CalcMeasureTranscodingProgressOverall)/(0.10)))*(0.10)
MinValue=0
MaxValue=100
DynamicVariables=1

[MeasureActivityOverallBandwidth]
Disabled=1
Group=activated
; Returns the Overall Bandwidth from the Activity API.
Measure=WebParser
Url=[MeasureActivity]
StringIndex2=1
RegExp=(?siU)(?(?=.* "total_bandwidth": .*, ).* "total_bandwidth": (.*), )
UpdateRate=#UpdateRateSeconds#
ErrorString=0
LogSubstringErrors=0
DynamicVariables=1

[MeasureActivityOverallBandwidthCalc]
Disabled=1
Group=activated
Measure=Calc
Formula=(ROUND(((MeasureActivityOverallBandwidth * 0.001))/(0.10)))*(0.10)
DynamicVariables=1

