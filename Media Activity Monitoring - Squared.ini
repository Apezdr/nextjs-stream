String=#AlwaysOpen#
IfCondition=([MeterCheckActivated]=1)
IfTrueAction=[!ShowMeterGroup "Bar"][!EnableMeasureGroup "Bar"][!ShowMeterGroup "activated"][!EnableMeasureGroup "activated"][!HideMeter "ActivityArrowDown"][!UpdateMeasureGroup "images"][!ShowMeterGroup "images"][!UpdateMeterGroup "images"][!HideMeter "ActivityArrow"][!HideMeter "ActivityArrowDown"]
