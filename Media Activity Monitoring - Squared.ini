[Metadata]
Name=NextJS Stream Desktop Monitoring
	Author=limitless
	Information=Displays current NextJS Stream media activity through the XML media activity endpoint.
License=Creative Commons Attribution-Non-Commercial-Share Alike 4.0
Version=1.2

[Variables]
; NextJS Stream media activity API. The /xml adapter keeps this skin's
; existing XML WebParser measures working without making the API skin-specific.
MediaActivityAppAddress=http://127.0.0.1:3333
MediaActivityAddress=#MediaActivityAppAddress#/api/media-activity/xml
MediaActivityToken=YDqP9HgFNlZKzSLJ80GEWBkA16s4Xhj5byiduUnaCfRpmV7w
Font=Segoe UI
RefreshRate=1
HideActivityLogo=0
HideHistogram=0
HideActivityArrows=0
AlwaysOpen=1
HideFilePath=0
HideBackgroundColors=1
HideOverallProgress=1
HideTopBar=0
SkinWidth=400
OverallSize=0
LeftPadding=25
TopPadding=5
IconXaxis=7
IconYaxis=84
IconBufferingXaxis=-28
BarWidth=(690 + #SkinWidth#)
OverallWidth=(720 + #SkinWidth#)
InsideWidth=(716 + #SkinWidth#)
BarHeight=2
UpdateRateSeconds=(#RefreshRate# * 20)
UpdateRateBufferingIcon=1
VideoDecisions="copy":"Copy","transcode":"Transcoding","directplay":"Direct Play"
ResolutionSubstitutes="sd":"480p","4k":"4K"
; ------------------------------------------
;
; Change Colors for the Skin here!
;
;
; EXAMPLE:
; 	The following lines are equivalent to solid opaque red:
;		SomeColor=255,0,0,255
;		SomeColor=255,0,0
;		SomeColor=(200 + 55),(2 - 2),0
;		SomeColor=FF0000FF
;		SomeColor=FF0000
;
; ------------------------------------------
CurrentProgressBarColor=185,250,160,255
TranscodingBarColor=150,150,150,255
StaticBarBackground=61,61,61,255
TransBarWidth=(#SkinWidth#+690)
TransBarHeight=16
LinePlacement=(#SkinWidth#+550)
UserFontSize=(#OverallSize# + 10)
DurationText=((#SkinWidth#/2)+335)r
StartingBarYaxis=98
StartingTextXaxis=22
NowPlayingXaxis=((#SkinWidth#/2)+354)r
DefaultFontColor=255,255,255
;End of [Variables]

