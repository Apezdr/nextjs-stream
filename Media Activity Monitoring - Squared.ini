Formula=((MeasureActivityDurationString1 / 1000) - ((MeasureActivityDurationString1 / 1000) % 60)) / 60
RegExpSubstitute=1
Substitute="^([0-9])$":"0\1"
DynamicVariables=1

[CalcUser1DurationSeconds]
Disabled=1
Group=activated
Measure=Calc
Formula=(MeasureActivityDurationString1 / 1000) % 60 = 60 ? 0 : (MeasureActivityDurationString1 / 1000) % 60
RegExpSubstitute=1
