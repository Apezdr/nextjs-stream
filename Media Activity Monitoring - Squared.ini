; DynamicVariables=1

[MeterTranscodeProgressBarOverall]
Hidden=1
Group=activated
MeasureName=CalcMeasureTranscodingProgressOverallRounded
Meter=BAR
ToolTipTitle=Overall Progress
ToolTipIcon=#@#\images\overall.ico
ToolTipType=1
; ToolTipText=Progress: [CalcMeasureProgressOverallRounded]%#CRLF#Transcoded: [CalcMeasureTranscodingProgressOverallRounded]%#CRLF#Overall Stream Bitrate: [MeasureActivityOverallBandwidthCalc] mbps
ToolTipText=Progress: [CalcMeasureProgressOverallRounded]%#CRLF#Overall Stream Bitrate: [MeasureActivityOverallBandwidthCalc] mbps
X=10
Y=(#OverallSize#+(#StartingBarYaxis#+195))
W=(700+#SkinWidth#)
