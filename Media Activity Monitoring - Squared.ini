[MeasureActivity]
; Returns the API Information this Skin will use while running.
Measure=WebParser
ProxyServer=/auto
Url=#MediaActivityAddress#/status/sessions?token=#MediaActivityToken#
RegExp="(?siU)^\S(.*)$"
UpdateRate=#UpdateRateSeconds#
OnChangeAction=[!RefreshGroup Main][!RefreshGroup activated][!RefreshGroup Bar]
OnConnectErrorAction=[!Delay 2000][!CommandMeasure MeasureActivity Update][!UpdateMeter MeterStreamsHistogram][!HideMeter MeterStreamCount][!HideMeter MeterTranscodeCount][!SetOption OneStream Text "Cannot"][!SetOption Streams Text "Cannot"][!SetOption Transcodes Text "Connect"][!SetOption OneTranscode Text "Connect"][!UpdateGroup Bar][!UpdateGroup Activated][!Redraw]
DynamicVariables=1
LogSubstringErrors=0

[MeasureActivityStreamsAPI]
; Returns the Stream Count from the API call shown above [MeasureActivity]
Group=Main | topbar
Measure=WebParser
Url=[MeasureActivity]
FinishAction=[!ShowMeter MeterTranscodeCount][!EnableMeasure MeasureActivityTranscodeCount][!UpdateMeasure MeasureActivityTranscodeCount][!ShowMeter MeterStreamCount][!SetOption OneStream Text "Stream"][!SetOption OneTranscode Text "Transcode"][!SetOption Streams Text "Streams"][!SetOption Transcodes Text "Transcodes"]
StringIndex2=1
RegExp=(?siU)MediaContainer size="(.*)"
UpdateRate=#UpdateRateSeconds#
ErrorString=0
LogSubstringErrors=0

;--------==================--------==================--------==================--------==================--------
;----------------------------------------------------------------------------------------------------------------
;--------==================--------==================--------==================--------==================--------
;----------------------------------------------------------------------------------------------------------------
;--------==================--------==================--------==================--------==================--------

[MeasureActivityStreamCount]
; Grabs just the stream count from [MeasureActivityStreamsAPI]. If there is
; exactly one stream, it displays the word "Stream". More or less than
; 1, and it displays the word "Streams".
Group=Main | topbar
Measure=WebParser
URL=[MeasureActivityStreamsAPI]
StringIndex=1
IfBelowValue=1
IfBelowAction=[!HideMeter OneStream][!ShowMeter Streams]
IfEqualValue=1
IfEqualAction=[!HideMeter Streams][!ShowMeter OneStream]
IfAboveValue=1
IfAboveAction=[!HideMeter OneStream][!ShowMeter Streams]
OnChangeAction=[!RefreshGroup activated][!SetOption MeterStreamsHistogram PrimaryColor "255,255,255,255"][!UpdateMeter MeterStreamsHistogram][!SetOption MeterStreamCount Text "%1"][!SetOption MeterTranscodeCount Text "%1"][!UpdateGroup "Bar"][!RefreshGroup "images"][!Redraw]

[MeasureActivityTranscodeCount]
Group=Main | topbar
Measure=WebParser
URL=#MediaActivityAddress#/transcode/sessions?token=#MediaActivityToken#
RegExp=(?siU)MediaContainer size="(.*)"
StringIndex=1
IfBelowValue=1
IfBelowAction=[!HideMeter OneTranscode][!ShowMeter Transcodes]
IfEqualValue=1
IfEqualAction=[!HideMeter Transcodes][!ShowMeter OneTranscode]
IfAboveValue=1
IfAboveAction=[!HideMeter OneTranscode][!ShowMeter Transcodes]
UpdateRate=#UpdateRateSeconds#

