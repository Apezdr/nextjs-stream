[CalcUser1ViewOffsetMinutes]
Disabled=1
Group=activated
; "view_offset" for duration watched in milliseconds
; This formula pulls the minutes for the millisecond.
Measure=Calc
Formula=((MeasureActivityViewOffsetString1 / 1000) - ((MeasureActivityViewOffsetString1 / 1000) % 60)) / 60
DynamicVariables=1

[CalcUser1ViewOffsetSeconds]
Disabled=1
Group=activated
; This allows us to Change the Current Watched time to a 2 Digit Number When the Value is between 0 - 9. (Ex. 02:03)
Measure=Calc
Formula=((MeasureActivityViewOffsetString1 / 1000) % 60 = 60 ? 00 : (MeasureActivityViewOffsetString1 / 1000) % 60)
RegExpSubstitute=1
Substitute="^([0-9])$":"0\1"
; This substitute turns the number into two digit form, this applies for numbers between 0 and 9.
;"0":"00","1":"01","2":"02","3":"03","4":"04","5":"05","6":"06","7":"07","8":"08","9":"09"
DynamicVariables=1

[CalcUser1DurationMinutes]
Disabled=1
